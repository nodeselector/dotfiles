run -b '~/.tpm/tpm'

# Tokyo Night color palette
color_orange="colour208"
color_purple="colour105"
color_green="colour114"
color_blue="colour111"
color_yellow="colour180"
color_red="colour203"
color_black="#1a1b26"
color_white="#c0caf5"
color_cyan="colour117"

# Theme contract (dracula plugin)
color_dark="$color_black"
color_light="$color_white"
color_session_text="$color_blue"
color_status_text="#565f89"
color_main="$color_blue"
color_secondary="$color_purple"
color_level_ok="$color_green"
color_level_warn="$color_yellow"
color_level_stress="$color_red"
color_window_off_indicator="$color_red"
color_window_off_status_bg="default"
color_window_off_status_current_bg="#414868"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
TMUX_FZF_LAUNCH_KEY="C-f"
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'laktak/extrakto'

# Extrakto: fuzzy text extraction from scrollback
set -g @extrakto_key 'Tab'
set -g @extrakto_grab_area 'window full'
set -g @extrakto_filter_order 'word path url line'
set -g @extrakto_popup_size '80%,60%'
set -g @extrakto_clip_tool 'pbcopy'

# Dracula theme (minimal)
set -g @dracula-plugins "none"
set -g @dracula-show-left-icon session
set -g @dracula-show-powerline false
set -g @dracula-refresh-rate 1
set -g @dracula-show-flags false

# --- Prefix ---
unbind C-b
set -g prefix C-a

# --- Splits ---
unbind %
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
bind v split-window -h -c "#{pane_current_path}"

# --- Copy/paste (macOS) ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe "pbcopy"
bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-word; run-shell -d 0.3; send-keys -X copy-pipe "pbcopy" }
bind -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-line; run-shell -d 0.3; send-keys -X copy-pipe "pbcopy" }
bind ] run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# --- Options ---
set -g mouse on
set -g mode-keys vi
set -g set-clipboard on
set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g status-interval 1
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g base-index 1
set -g automatic-rename off
set -g renumber-windows on
set-option -g default-command "exec zsh"

# --- Pane borders (Tokyo Night) ---
set -gw pane-border-indicators off
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#ff9e64]#[bg=default]#[fg=#282a36]#[bg=#ff9e64]#[bold] #{pane_index}  #{pane_current_command} #[fg=#ff9e64]#[bg=default]#[nobold],#[fg=#44475a]#[bg=default]#[fg=#f8f8f2]#[bg=#44475a]#[nobold] #{pane_index}  #{pane_current_command} #[fg=#44475a]#[bg=default]#[nobold]}"
set -g pane-border-style "fg=#282a36"
set -g pane-active-border-style "fg=#282a36"

# --- Copy mode search styling (Tokyo Night) ---
set -g copy-mode-match-style "bg=#414868,fg=#7aa2f7"
set -g copy-mode-current-match-style "bg=#ff9e64,fg=#1a1b26"

# --- Key bindings ---
bind x kill-pane
bind t set status
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind-key C-r command-prompt "rename-session %%"

# Reorder windows (no prefix)
bind -n C-S-H swap-window -t -1\; select-window -t -1
bind -n C-S-L swap-window -t +1\; select-window -t +1

# Move panes (no prefix)
bind -n C-S-J swap-pane -D
bind -n C-S-K swap-pane -U

# Resize panes (Alt+vim, no prefix)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 5

# Synchronize panes toggle
bind Y set synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# Pipe-pane logging
bind P run-shell 'mkdir -p ~/tmux-logs && tmux pipe-pane -o "cat >> ~/tmux-logs/#S-#W-#I-#P.log"' \; display "Logging ON"
bind M-p pipe-pane \; display "Logging OFF"

# Scratch terminal popup (Alt+i, no prefix)
bind -n M-i if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  'display-popup -d "#{pane_current_path}" -xC -yC -w80% -h75% -E "tmux new-session -A -s scratch -c \"#{pane_current_path}\""'

# Quick actions menu
bind Space display-menu -T "#[align=centre] Quick Actions " -x C -y C \
  "Next Layout"           l "next-layout" \
  "Even Horizontal"       h "select-layout even-horizontal" \
  "Even Vertical"         v "select-layout even-vertical" \
  "Main Horizontal"       m "select-layout main-horizontal" \
  "Main Vertical"         M "select-layout main-vertical" \
  "Tiled"                 t "select-layout tiled" \
  "" \
  "Toggle Sync Panes"     s "set synchronize-panes" \
  "Toggle Mouse"          o "set mouse" \
  "Toggle Status Bar"     b "set status" \
  "" \
  "Log Pane ON"           p "run-shell 'mkdir -p ~/tmux-logs && tmux pipe-pane -o \"cat >> ~/tmux-logs/#S-#W-#I-#P.log\"'; display 'Logging ON'" \
  "Log Pane OFF"          P "pipe-pane; display 'Logging OFF'" \
  "" \
  "Break Pane → Window"   ! "break-pane" \
  "Join Pane ← Window"    j "choose-window 'join-pane -h -s \"%%\"'" \
  "#{?window_zoomed_flag,Unzoom,Zoom} Pane"  z "resize-pane -Z"

# fzf scrollback search
bind / display-popup -E -w 80% -h 80% "~/.local/bin/tmux-fzf-scrollback"

# fzf keybinding search
bind ? display-popup -E -w 80% -h 80% "~/.local/bin/tmux-fzf-keys"

# Swap pane picker
bind S display-popup -E -w 60% -h 40% \
  "panes=\$(tmux list-panes -F '#{pane_index}: #{pane_current_command} [#{pane_width}x#{pane_height}] #{?pane_active,◀ active,}' \
    | grep -v '◀ active'); \
   [ -z \"\$panes\" ] && echo 'Only one pane.' && sleep 1 && exit; \
   target=\$(echo \"\$panes\" | fzf --reverse --header='Swap with:'); \
   [ -z \"\$target\" ] && exit; \
   idx=\$(echo \"\$target\" | cut -d: -f1); \
   tmux swap-pane -t \"\$idx\""

# --- Hooks ---
# Adaptive layout on resize
set-hook -g client-resized 'run-shell -b "[ $(tmux list-panes | wc -l) -gt 1 ] && tmux select-layout -E || true"'
