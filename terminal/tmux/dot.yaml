# tpm cloned via punch deps (deps.yaml)
darwin:
  installs: $DOTFILES_DIR/dev/brew/brew-install-idempotent tmux

global:
  links:
    .tmux.conf: ~/.tmux.conf
    tmux.zshrc.zsh: ~/.zshrc.d/tmux.zshrc.zsh
    tmux-fzf-scrollback.sh: ~/.local/bin/tmux-fzf-scrollback
    tmux-fzf-keys.sh: ~/.local/bin/tmux-fzf-keys
    tmux-swap-pane.sh: ~/.local/bin/tmux-swap-pane
    session-switch.sh: ~/.local/bin/session-switch
