installs:
  # is there a better way to do this?
  cmd: >
      bash -c '
        if ! [[ -d $HOME/.antigen ]]; then
          git clone https://github.com/zsh-users/antigen.git $HOME/.antigen
        fi
        '
links:
  .zshrc: ~/.zshrc
  dotfiles-venv.zshrc.zsh: ~/.zshrc.d/dotfiles-venv.zshrc.zsh
  bun.zshrc.zsh: ~/.zshrc.d/bun.zshrc.zsh
