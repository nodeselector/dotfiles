installs:
  cmd: >
    bash -c '
      if ! type gvm >/dev/null; then
        export GVM_NO_UPDATE_PROFILE=true
        bash < <(curl -sSL https://raw.githubusercontent.com/moovweb/gvm/master/binscripts/gvm-installer)
      fi

      if [[ $(uname) == "Linux" ]]; then
        sudo apt-get update -qq && sudo apt-get install -y bison || true
      fi
    '

links:
  gvm.zshrc.zsh: ~/.zshrc.d/gvm.zshrc.zsh
